# HTTP entrypoint. After DNS points to the VPS, obtain TLS certs (see DEPLOY.md),
# then enable the HTTPS server block in https.conf.example.

upstream dmft_web {
  server web:3000;
  keepalive 32;
}

upstream dmft_api {
  server api:3001;
  keepalive 32;
}

# Single public port (default 3000). nginx proxies:
#   GET /              -> web:3000   (Next.js UI, internal network)
#   GET /api/v1/...    -> api:3001   (Express API, internal network)
# Browsers only talk to PUBLIC_PORT; web and api are not published to the host.

server {
  listen 80;
  server_name _;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location /api/ {
    proxy_pass http://dmft_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_read_timeout 120s;
  }

  location /health {
    proxy_pass http://dmft_api/health;
    access_log off;
  }

  location /docs {
    proxy_pass http://dmft_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://dmft_web;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}
