# Production stack for Hostinger KVM 8 (Ubuntu)
# Run from api/deploy: docker compose -f docker-compose.prod.yml --env-file .env.production up -d

name: dmft-survey-prod

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

services:
  mongodb:
    image: mongo:8
    container_name: dmft-mongodb
    restart: unless-stopped
    logging: *default-logging
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-dmft_survey}
    volumes:
      - mongodb_data:/data/db
    networks:
      - internal
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "mongodb://localhost:27017/admin",
          "--eval",
          "db.runCommand({ ping: 1 }).ok",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G

  redis:
    image: redis:8-alpine
    container_name: dmft-redis
    restart: unless-stopped
    logging: *default-logging
    command:
      [
        "redis-server",
        "--requirepass",
        "${REDIS_PASSWORD}",
        "--maxmemory",
        "512mb",
        "--maxmemory-policy",
        "allkeys-lru",
        "--appendonly",
        "yes",
      ]
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 768M

  minio:
    image: minio/minio:latest
    container_name: dmft-minio
    restart: unless-stopped
    logging: *default-logging
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_ACCESS_KEY}
    volumes:
      - minio_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: dmft-api
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3001
      TRUST_PROXY_HOPS: 1
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/${MONGO_INITDB_DATABASE:-dmft_survey}?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
    volumes:
      - api_uploads:/app/uploads
      - api_logs:/app/logs
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  web:
    build:
      context: ${APP_BUILD_CONTEXT:-../../surveymasterappv1}
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: dmft-web
    restart: unless-stopped
    logging: *default-logging
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1536M

  nginx:
    image: nginx:1.27-alpine
    container_name: dmft-nginx
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - web
      - api
    networks:
      - internal
      - edge
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  certbot:
    profiles: ["ssl"]
    image: certbot/certbot:latest
    container_name: dmft-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: /bin/sh
    command: -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h; done"

networks:
  internal:
    driver: bridge
  edge:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
  minio_data:
  api_uploads:
  api_logs:
  certbot_www:
  certbot_certs:
